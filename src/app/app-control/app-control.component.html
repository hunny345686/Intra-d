<div *ngIf="currentView === 'control'" class="control-container">
  <div class="header">
    <h1>Intra-d Multi-App Control Center</h1>
    <div class="user-info" *ngIf="currentUser">
      <span>{{currentUser.email}} ({{currentUser.role}})</span>
      <button (click)="logout()" class="logout-btn">Logout</button>
    </div>
  </div>
  
  <div *ngIf="!currentUser" class="login-prompt">
    <h2>Access Control System</h2>
    <p>Please login to access the multi-app dashboard</p>
    <button (click)="goToLogin()" class="login-btn">Login to Continue</button>
  </div>
  
  <div *ngIf="currentUser" class="app-grid">
    <div 
      *ngFor="let app of availableApps" 
      class="app-card"
      [class]="app.id + '-card'">
      <div class="app-icon">{{app.icon}}</div>
      <h3>{{app.title}}</h3>
      <p>{{app.description}}</p>
      <button 
        (click)="app.action()" 
        class="app-btn"
        [class]="app.buttonClass">
        {{app.buttonText}}
      </button>
    </div>
  </div>
</div>

<div *ngIf="currentView === 'admin'">
  <app-admin-dashboard (backToControl)="goBackToControl()"></app-admin-dashboard>
</div>
