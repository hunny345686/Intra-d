<!-- src/app/seller/seller.component.html -->
<div class="seller-form-container my-5 p-4 rounded-xl shadow-lg">
    <div class="row text-center mb-4">
        <div class="col-12">
            <h1 class="display-5 fw-bold text-primary-green mb-3">Seller Form</h1>
            <p class="lead text-muted">Register your raw materials for sale.</p>
        </div>
    </div>

    <form (ngSubmit)="onSubmit()" #sellerForm="ngForm" novalidate>
        <div class="mb-4">
            <label for="sellerName" class="form-label fw-semibold">Name of Seller: <span class="text-danger">*</span></label>
            <input type="text" class="form-control form-control-custom shadow-sm" 
                   [class.is-invalid]="(sellerForm.submitted || sellerName.touched) && sellerName.invalid"
                   id="sellerName" #sellerName="ngModel"
                   [(ngModel)]="formData.sellerName" name="sellerName" placeholder="Enter your name" required>
            <div class="invalid-feedback" *ngIf="(sellerForm.submitted || sellerName.touched) && sellerName.invalid">
                Seller name is required
            </div>
        </div>

        <div class="mb-4">
            <label for="contactNo" class="form-label fw-semibold">Contact No: <span class="text-danger">*</span></label>
            <input type="tel" class="form-control form-control-custom shadow-sm" 
                   [class.is-invalid]="(sellerForm.submitted || contactNo.touched) && contactNo.invalid"
                   id="contactNo" #contactNo="ngModel"
                   [(ngModel)]="formData.contactNo" name="contactNo" placeholder="Enter your mobile number" required
                   (input)="onPhoneInput($event)"
                   pattern="[0-9]{10}" maxlength="10" minlength="10" title="Please enter exactly 10 digits">
            <div class="invalid-feedback" *ngIf="(sellerForm.submitted || contactNo.touched) && contactNo.invalid">
                <span *ngIf="contactNo.errors?.['required']">Contact number is required</span>
                <span *ngIf="contactNo.errors?.['pattern'] || contactNo.errors?.['minlength'] || contactNo.errors?.['maxlength']">Contact number must be exactly 10 digits</span>
            </div>
        </div>

        <div class="mb-4">
            <label for="rawMaterialType" class="form-label fw-semibold">Raw Material Type: <span class="text-danger">*</span></label>
            <input type="text" class="form-control form-control-custom shadow-sm" 
                   [class.is-invalid]="sellerForm.submitted && rawMaterialType.invalid"
                   id="rawMaterialType" #rawMaterialType="ngModel"
                   [(ngModel)]="formData.rawMaterialType" name="rawMaterialType" placeholder="e.g., Wheat, Mango, Onion"
                   required>
            <div class="invalid-feedback" *ngIf="sellerForm.submitted && rawMaterialType.invalid">
                Raw material type is required
            </div>
        </div>

        <div class="mb-4">
            <label for="quantity" class="form-label fw-semibold">Quantity: <span class="text-danger">*</span></label>
            <input type="text" class="form-control form-control-custom shadow-sm" 
                   [class.is-invalid]="sellerForm.submitted && quantity.invalid"
                   id="quantity" #quantity="ngModel"
                   [(ngModel)]="formData.quantity" name="quantity" placeholder="e.g., 1000 kg, 50 quintals" required>
            <div class="invalid-feedback" *ngIf="sellerForm.submitted && quantity.invalid">
                Quantity is required
            </div>
        </div>

        <div class="mb-4">
            <label for="location" class="form-label fw-semibold">Location: <span class="text-danger">*</span></label>
            <input type="text" class="form-control form-control-custom shadow-sm" 
                   [class.is-invalid]="sellerForm.submitted && location.invalid"
                   id="location" #location="ngModel"
                   [(ngModel)]="formData.location" name="location" placeholder="Enter your location (village/city)"
                   required>
            <div class="invalid-feedback" *ngIf="sellerForm.submitted && location.invalid">
                Location is required
            </div>
        </div>

        <!-- Additional Fields for Database/API -->
        <div class="row">
            <div class="col-md-6 mb-4">
                <label for="sellerEmail" class="form-label fw-semibold">Email: <span class="text-danger">*</span></label>
                <input type="email" class="form-control form-control-custom shadow-sm" 
                       [class.is-invalid]="sellerForm.submitted && sellerEmail.invalid"
                       id="sellerEmail" #sellerEmail="ngModel"
                       [(ngModel)]="formData.email" name="sellerEmail" placeholder="Enter your email" required email>
                <div class="invalid-feedback" *ngIf="sellerForm.submitted && sellerEmail.invalid">
                    <span *ngIf="sellerEmail.errors?.['required']">Email is required</span>
                    <span *ngIf="sellerEmail.errors?.['email']">Please enter a valid email</span>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <label for="pricePerUnit" class="form-label fw-semibold">Price per Unit:</label>
                <input type="number" class="form-control form-control-custom shadow-sm" id="pricePerUnit"
                    [(ngModel)]="formData.pricePerUnit" name="pricePerUnit" placeholder="Enter price" min="0" step="0.01">
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-4">
                <label for="harvestDate" class="form-label fw-semibold">Harvest Date: <span class="text-danger">*</span></label>
                <input type="date" class="form-control form-control-custom shadow-sm" 
                       [class.is-invalid]="sellerForm.submitted && harvestDate.invalid"
                       id="harvestDate" #harvestDate="ngModel"
                       [(ngModel)]="formData.harvestDate" name="harvestDate" required>
                <div class="invalid-feedback" *ngIf="sellerForm.submitted && harvestDate.invalid">
                    Harvest date is required
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <label for="qualityGrade" class="form-label fw-semibold">Quality Grade:</label>
                <select class="form-select form-control-custom shadow-sm" id="qualityGrade"
                    [(ngModel)]="formData.qualityGrade" name="qualityGrade" required>
                    <option value="" disabled selected>Select quality grade</option>
                    <option value="premium">Premium</option>
                    <option value="standard">Standard</option>
                    <option value="basic">Basic</option>
                </select>
            </div>
        </div>

        <!-- Submit Button -->
        <div class="row mt-5">
            <div class="col-12 text-center">
                <button type="submit" class="btn btn-primary-green btn-lg px-5 py-3 rounded-pill shadow-sm"
                    [disabled]="!sellerForm.valid">Submit Offer</button>
            </div>
        </div>
    </form>
</div>
